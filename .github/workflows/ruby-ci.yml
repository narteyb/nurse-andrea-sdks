name: Ruby SDK CI

on:
  push:
    paths:
      - "packages/ruby/**"
      - ".github/workflows/ruby-ci.yml"
  pull_request:
    paths:
      - "packages/ruby/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.2", "3.3"]
        # The gem's Gemfile pins rails "~> 8.1" and the gemspec declares
        # no Rails version constraint beyond what the Engine/Railtie
        # integration uses. Single Rails axis until the gem's supported
        # range broadens — Sprint A audit finding. The brief proposed
        # 7.1/7.2 but the gemspec/Gemfile target 8.1 only.
        rails-version: ["8.1"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: packages/ruby

      - name: RSpec
        working-directory: packages/ruby
        run: bundle exec rspec

      - name: RuboCop
        working-directory: packages/ruby
        run: bundle exec rubocop --parallel

      - name: Brakeman
        working-directory: packages/ruby
        run: bundle exec brakeman --no-pager --quiet

      - name: bundler-audit
        working-directory: packages/ruby
        run: bundle exec bundler-audit check --update

      # Sprint A D5 (GAP-05) — doc-sync. README must reference the
      # VERSION constant from lib/nurse_andrea/version.rb. Soft check —
      # surfaces a workflow warning rather than failing the build,
      # since READMEs may legitimately defer version mentions to
      # CHANGELOG.md.
      - name: Doc-sync — README references current version
        working-directory: packages/ruby
        run: |
          VERSION=$(ruby -e 'require_relative "lib/nurse_andrea/version"; puts NurseAndrea::VERSION')
          if grep -qF "$VERSION" README.md; then
            echo "README.md references version $VERSION ✓"
          else
            echo "::warning::README.md does not reference current version $VERSION"
          fi

      # Sprint A D3 (GAP-03) — host-app fixture smoke. Boots a minimal
      # Rails::Application that depends on the local gem via path:,
      # mounts NurseAndrea::Engine, hits /nurse_andrea/status, asserts
      # 200/JSON, and checks the silent-degradation path for missing
      # org_token. Exit 0 on success.
      - name: Host-app fixture smoke
        working-directory: packages/ruby/spec/fixtures/host_app
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4
          bundle exec ruby smoke.rb
