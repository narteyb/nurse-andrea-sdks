name: Python SDK CI

on:
  push:
    paths:
      - "packages/python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "packages/python/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/python
        run: pytest --tb=short -q

      # Sprint A D5 (GAP-05) — doc-sync. README must reference the
      # version string in pyproject.toml. This check was scoped here
      # explicitly because pre-Sprint-A README claimed "Pre-release
      # 0.1.0" while pyproject.toml declared 1.0.0. Soft check —
      # surfaces a workflow warning if missing.
      - name: Doc-sync — README references current version
        working-directory: packages/python
        run: |
          VERSION=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          if grep -qF "$VERSION" README.md; then
            echo "README.md references version $VERSION ✓"
          else
            echo "::warning::README.md does not reference current version $VERSION"
          fi
