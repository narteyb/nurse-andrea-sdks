name: Node.js SDK CI

on:
  push:
    paths:
      - "packages/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    paths:
      - "packages/node/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=packages/node

      - name: Build
        run: npm run build --workspace=packages/node

      - name: Test
        run: npm test --workspace=packages/node

      # Sprint A D5 (GAP-05) — doc-sync. README must reference the
      # SDK_VERSION constant from src/version.ts. Soft check —
      # surfaces a workflow warning if missing.
      - name: Doc-sync — README references current version
        working-directory: packages/node
        run: |
          VERSION=$(grep -E "SDK_VERSION\s*=" src/version.ts | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          if grep -qF "$VERSION" README.md; then
            echo "README.md references version $VERSION ✓"
          else
            echo "::warning::README.md does not reference current version $VERSION"
          fi
