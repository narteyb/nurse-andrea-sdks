name: Node.js SDK CI

on:
  push:
    paths:
      - "packages/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    paths:
      - "packages/node/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=packages/node

      - name: Build
        run: npm run build --workspace=packages/node

      - name: Test
        run: npm test --workspace=packages/node
