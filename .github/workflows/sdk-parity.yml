name: SDK Parity

# Sprint B D2 (GAP-06) — cross-runtime parity matrix.
#
# What "parity" means here:
#
#   The SDKs do not sign payloads today (Sprint C will add a
#   timestamp header; full HMAC signing is future work), so
#   byte-identical payloads are NOT the goal. Parity means
#   *behavioral equivalence* on three dimensions:
#
#     1. Headers emitted — the 5 canonical headers
#        (Content-Type, Authorization, X-NurseAndrea-Workspace,
#        X-NurseAndrea-Environment, X-NurseAndrea-SDK) are present
#        on every ingest request from every runtime, with values
#        derived consistently from configuration.
#
#     2. Payload structure — every runtime emits the same top-level
#        JSON keys (`services`, `sdk_version`, `sdk_language`,
#        `logs` | `metrics`) and the same per-entry keys
#        (`level/message/occurred_at/source/payload` for logs;
#        `name/value/unit/occurred_at/tags` for metrics). Specific
#        values may differ — a Ruby process emits different memory
#        metrics than a Node process — but the field names match.
#
#     3. Misconfig degradation — configuring with a missing
#        `org_token` does not raise at SDK boot; the runtime is
#        either silent-degrade (Ruby/Node/Python) or
#        return-error-from-Configure (Go). No HTTP request reaches
#        the wire while config is invalid.
#
# The canonical wire spec the assertions reference is
# docs/sdk/payload-format.md.
#
# Each runtime job runs only its parity test (full CI is already
# covered by ruby-ci / node-ci / python-ci / go-ci on the same push).

on:
  push:
    paths:
      - "packages/**"
      - "docs/sdk/payload-format.md"
      - ".github/workflows/sdk-parity.yml"
  pull_request:
    paths:
      - "packages/**"
      - "docs/sdk/payload-format.md"

jobs:
  ruby:
    name: Ruby parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: packages/ruby
      - name: RSpec parity
        working-directory: packages/ruby
        run: bundle exec rspec spec/nurse_andrea/parity_spec.rb

  node:
    name: Node parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install + build
        run: |
          npm ci --workspace=packages/node
          npm run build --workspace=packages/node
      - name: Jest parity
        run: npm test --workspace=packages/node -- tests/parity.test.ts

  python:
    name: Python parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: packages/python
        run: pip install -e ".[dev]"
      - name: Pytest parity
        working-directory: packages/python
        run: pytest tests/test_parity.py --tb=short -q

  go:
    name: Go parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Go parity tests
        working-directory: packages/go
        run: go test -run "TestParity" ./...

  # Summary job — fails if any of the four runtime jobs failed.
  # Required for branch-protection checks: protect main on this job
  # rather than on each runtime job individually.
  parity-summary:
    name: Parity summary
    runs-on: ubuntu-latest
    needs: [ ruby, node, python, go ]
    if: always()
    steps:
      - name: Fail if any runtime parity job failed
        run: |
          status_ruby='${{ needs.ruby.result }}'
          status_node='${{ needs.node.result }}'
          status_python='${{ needs.python.result }}'
          status_go='${{ needs.go.result }}'
          echo "Ruby:   $status_ruby"
          echo "Node:   $status_node"
          echo "Python: $status_python"
          echo "Go:     $status_go"
          if [[ "$status_ruby" != "success" || \
                "$status_node" != "success" || \
                "$status_python" != "success" || \
                "$status_go" != "success" ]]; then
            echo "::error::At least one runtime parity job failed."
            exit 1
          fi
          echo "All four runtimes pass cross-runtime parity."
